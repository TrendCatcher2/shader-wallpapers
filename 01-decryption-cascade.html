<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>01 · Decryption Cascade</title>
<link rel="stylesheet" href="shader-base.css" />
<style>
  :root { --accent: #00ff95; }
  body { background: #020403; }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<div class="hud tl">
  <div class="row"><span class="dot"></span><strong>wp_01</strong>&nbsp;·&nbsp;decryption_cascade</div>
</div>
<div class="hud bl">
  <div><span class="k">stream</span> <span class="v">0x7f · ascii_drain</span></div>
  <div><span class="k">cipher</span> <span class="v">aes-256-cbc → plaintext</span></div>
</div>
<div class="hud br">
  <div><span class="k">mouse</span> <span class="v">bend column flow</span></div>
  <div><span class="k">click</span> <span class="v">decrypt pulse</span></div>
</div>

<script src="shader-base.js"></script>
<script id="frag" type="x-shader/x-fragment">

  // Cybersecurity "data rain" — vertical streams of binary/ascii brightness.
  // Mouse acts as a gravity well that bends columns toward it.
  // Clicks send out radial "decryption" pulses that flip stream color
  // from green phosphor toward warm amber as they pass.

  float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
  float hash11(float n){ return fract(sin(n) * 43758.5453); }

  // small bitmap-ish glyph: a 3x5 cell with on/off pixels driven by hash.
  float glyph(vec2 cell, vec2 sub){
    // sub in [0,1] within a cell. Build a 3 wide x 5 tall grid.
    vec2 g = floor(sub * vec2(3.0, 5.0));
    float seed = hash(cell + floor(uTime * 0.5 + hash(cell) * 12.0));
    float on = step(0.55, hash(cell * 7.13 + g * 1.7 + floor(seed * 9.0)));
    // pixel insides
    vec2 f = fract(sub * vec2(3.0, 5.0));
    float pix = step(0.18, f.x) * step(f.x, 0.82) * step(0.12, f.y) * step(f.y, 0.88);
    return on * pix;
  }

  void main(){
    vec2 uv = gl_FragCoord.xy / uRes.xy;
    vec2 p  = gl_FragCoord.xy;

    // mouse gravity-well displacement on x
    vec2 toMouse = uMouse - p;
    float d = length(toMouse);
    float pull = 60.0 / (d + 80.0);
    p.x += toMouse.x * pull * 0.18;

    // columns
    float colW = 14.0;
    float col = floor(p.x / colW);
    float colSeed = hash11(col * 1.37);

    // each column has its own speed + offset
    float speed = 60.0 + colSeed * 220.0;
    float yScroll = p.y + uTime * speed + colSeed * 4000.0;

    float rowH = 20.0;
    float row = floor(yScroll / rowH);
    vec2 sub = vec2(fract(p.x / colW), fract(yScroll / rowH));

    // brightness along the stream — head bright, tail dim
    float headSeed = hash(vec2(col, floor(uTime * speed / 240.0 + colSeed * 40.0)));
    float headY = headSeed * 60.0 + 20.0;
    float along = mod(row, 32.0) / 32.0;
    float bright = pow(1.0 - along, 2.2);
    // sparkle at head
    float head = smoothstep(0.92, 1.0, 1.0 - along) * 1.8;

    float g = glyph(vec2(col, row), sub);

    // decryption pulses from clicks: warm amber bloom following ring fronts
    float decrypt = 0.0;
    for (int i = 0; i < 8; i++){
      vec4 c = uClicks[i];
      if (c.w < 0.5) continue;
      float age = uTime - c.z;
      if (age < 0.0 || age > 3.0) continue;
      float r = age * 520.0;
      float dd = length(gl_FragCoord.xy - c.xy);
      float ring = exp(-abs(dd - r) * 0.012) * exp(-age * 0.9);
      decrypt = max(decrypt, ring);
    }

    vec3 phosphor = vec3(0.05, 1.0, 0.55);
    vec3 amber    = vec3(1.0, 0.72, 0.18);
    vec3 col3 = mix(phosphor, amber, clamp(decrypt * 1.4, 0.0, 1.0));

    float val = (bright + head) * g;
    vec3 color = col3 * val;

    // soft ambient mouse glow
    color += phosphor * 0.04 * smoothstep(360.0, 0.0, d);

    // vignette + grain
    vec2 vu = uv - 0.5;
    color *= 1.0 - dot(vu, vu) * 0.9;
    color += (hash(gl_FragCoord.xy + uTime) - 0.5) * 0.02;

    // baseline dark
    color += vec3(0.005, 0.012, 0.008);

    gl_FragColor = vec4(color, 1.0);
  }
</script>
<script>
  ShaderWallpaper.mount({
    canvas: document.getElementById('stage'),
    fragment: document.getElementById('frag').textContent,
  });
</script>
</body>
</html>
